spring:
  application:
    name: family-finance-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/familyfinance}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Necessário para Supabase (SSL / pgBouncer)
      connection-test-query: SELECT 1
      data-source-properties:
        sslmode: ${DB_SSLMODE:prefer}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    # Para Supabase: use a URL de conexão direta (não o pooler)
    url: ${FLYWAY_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/familyfinance}}
    user: ${FLYWAY_USER:${DATABASE_USERNAME:postgres}}
    password: ${FLYWAY_PASSWORD:${DATABASE_PASSWORD:postgres}}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/json,application/javascript
  # Render encerra idle connections após 15min — keep-alive adequado
  tomcat:
    connection-timeout: 20000
    keep-alive-timeout: 30000

app:
  jwt:
    secret: ${JWT_SECRET:bXlWZXJ5TG9uZ1NlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvblRoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZw==}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  encryption:
    key: ${ENCRYPTION_KEY:MySecretEncryptionKey1234567890AB}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.familyfinance: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      status:
        http-mapping:
          DOWN: 200
          OUT_OF_SERVICE: 200
  health:
    mail:
      enabled: false
    diskspace:
      enabled: false
