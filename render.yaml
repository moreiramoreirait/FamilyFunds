services:
  # ─── Backend (Spring Boot) ───────────────────────────────────────────────
  - type: web
    name: familyfunds-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free

    envVars:
      # Supabase connection — cole a JDBC URL do seu projeto Supabase
      - key: DATABASE_URL
        sync: false   # defina no dashboard do Render

      - key: DATABASE_USERNAME
        sync: false

      - key: DATABASE_PASSWORD
        sync: false

      # Gerado automaticamente pelo Render
      - key: JWT_SECRET
        generateValue: true

      - key: ENCRYPTION_KEY
        generateValue: true

      - key: FRONTEND_URL
        value: https://family-funds-eight.vercel.app

      - key: CORS_ALLOWED_ORIGINS
        value: https://family-funds-eight.vercel.app,http://localhost:5173,http://localhost:5174

      # SMTP para e-mails de recuperação de senha (opcional)
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

      - key: PORT
        value: "8080"

    healthCheckPath: /actuator/health

    autoDeploy: true
